<!DOCTYPE html>
<html>
<head>
<title>Wedding Invite</title>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body, html{
  margin:0;
  padding:0;
  height:100%;
}

.hero{
  position:relative;
  width:100%;
  height:100vh;
  background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),url('couple.jpg');
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero-text{color:white;cursor:pointer;padding:0 20px;}

.invitation-text{
  font-family:'Great Vibes',cursive;
  font-size:2rem;
  opacity:0;
  animation:fadeUp 2s forwards;
}

.hero-text h1{
  font-family:'Playfair Display',serif;
  font-size:5rem;
  margin:0;
  opacity:0;
  animation:fadeUp 2s .5s forwards;
}

.tap-text{
  font-family:'Poppins';
  font-size:1.4rem;
  opacity:0;
  animation:fadeUp 2s 1s forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-text" onclick="go()">
    <p class="invitation-text">You are cordially invited to the wedding</p>
    <h1>Normelein & Harvy</h1>
    <p class="tap-text">Tap to Enter 💍</p>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function go(){
  let music=document.getElementById("music");
  music.play().catch(()=>{});
  setTimeout(()=>window.location='main.php',2000);
}
</script>

</body>
</html>
